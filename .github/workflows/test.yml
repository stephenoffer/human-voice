name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  stress-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run linter stress + correctness suite
        run: python3 tests/stress_test.py
      - name: Smoke-check the CLI on the example pair
        run: |
          python3 skills/human-voice/scripts/detect_ai_prose.py skills/human-voice/examples/after.md
          python3 skills/human-voice/scripts/detect_ai_prose.py --fail-over 5 skills/human-voice/examples/after.md
      - name: Evaluation regression gate (no metric drift allowed)
        run: |
          python3 eval/run_eval.py --check
          python3 eval/ablation.py --check
      - name: Detector harness smoke (offline, no network)
        run: python3 eval/detector_harness.py

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev tooling
        run: pip install ruff mypy pytest
      - name: Ruff (lint)
        run: ruff check skills/human-voice/scripts/human_voice_linter eval tests
      - name: Mypy (type-check the package + eval/lib.py)
        run: mypy
      - name: Pytest (eval unit tests + stress wrapper)
        run: pytest -q

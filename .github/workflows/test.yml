name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  stress-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run linter stress + correctness suite
        run: python3 tests/stress_test.py
      - name: Smoke-check the CLI on the example pair
        run: |
          python3 skills/human-voice/scripts/detect_ai_prose.py skills/human-voice/examples/after.md
          python3 skills/human-voice/scripts/detect_ai_prose.py --fail-over 5 skills/human-voice/examples/after.md
      - name: Run the evaluation harness
        run: |
          python3 eval/run_eval.py
          python3 eval/ablation.py
